services:
  test-db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress_test
      MYSQL_USER: wptest
      MYSQL_PASSWORD: wptest
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpunit:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      WP_DB_HOST: test-db
      WP_DB_NAME: wordpress_test
      WP_DB_USER: wptest
      WP_DB_PASSWORD: wptest
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_CORE_DIR: /tmp/wordpress
    volumes:
      - ./plugins/plugin-name:/app/plugin-name
      - ./tests:/app/tests
    entrypoint: ["/bin/bash", "/app/tests/bin/run-tests.sh"]
